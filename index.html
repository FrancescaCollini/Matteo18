<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alice in Wonderland Birthday Invitation</title>
    <style>
        body {
            font-family: "Arial", sans-serif;
            background-color: #f0e68c;
            color: #5d5c61;
            text-align: center;
            padding: 50px;
        }
        h1 {
            color: #7c4dff;
        }
        .invitation {
            border: 2px dashed #ff4081;
            padding: 20px;
            border-radius: 10px;
            background-color: #fff;
        }
        .date {
            font-size: 1.2em;
            margin: 15px 0;
        }
        .rsvp {
            font-size: 1em;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <h1>You are Invited!</h1>
    <div class="invitation">
        <h2>Join us for an Alice in Wonderland themed birthday party!</h2>
        <p class="date">Date: March 15, 2026</p>
        <p class="time">Time: 2:00 PM - 5:00 PM</p>
        <p>Location: 123 Wonderland Lane</p>
        <p class="rsvp">Please RSVP by March 1 to the Queen of Hearts!</p>
    </div>
</body>
</html>
